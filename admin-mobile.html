<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사운드포스트 어드민 - 순서 조정 기능</title>
    <style>
        :root {
            --wood: #3d2b1f; --gold: #d4af37; --bg: #f8f9fa;
            --card-bg: #ffffff; --danger: #e74c3c; --accent: #3498db;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        header { background-color: var(--wood); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); }
        .container { padding: 15px; }

        .config-card { background: #eee; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input, button { border-radius: 8px; border: 1px solid #ddd; padding: 12px; font-size: 16px; width: 100%; box-sizing: border-box; }

        /* 곡 카드 */
        .song-card { background: var(--card-bg); border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; overflow: hidden; }
        .song-header { padding: 12px 15px; background: #f1f1f1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        
        /* 순서 조절 버튼 그룹 */
        .order-controls { display: flex; gap: 5px; }
        .btn-order { width: 40px; height: 40px; padding: 0; background: white; color: var(--wood); border: 1px solid #ccc; font-weight: bold; }
        .btn-order:disabled { opacity: 0.3; }

        .song-body { padding: 15px; }
        .part-item { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .part-inputs { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-bottom: 8px; }

        .btn-add-song { background: #666; color: white; margin-bottom: 20px; font-weight: bold; }
        .btn-add-part { background: #f9f9f9; color: #333; font-size: 0.9rem; border: 1px dashed #ccc; }
        .btn-remove { background: none; color: var(--danger); border: none; padding: 5px; font-size: 0.85rem; width: auto; text-decoration: underline; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; gap: 10px; z-index: 1000; }
        .btn-save { background: var(--gold); color: white; border: none; flex: 2; font-weight: bold; }
        .btn-load { background: var(--wood); color: white; border: none; flex: 1; }
        
        .label { font-size: 0.75rem; color: #888; margin-bottom: 4px; display: block; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0; letter-spacing:2px;">SOUNDPOST ADMIN</h3>
</header>

<div class="container">
    <div class="config-card">
        <span class="label">GITHUB SETTINGS</span>
        <input type="password" id="ghToken" placeholder="GitHub Access Token">
        <input type="text" id="ghRepo" placeholder="아이디/저장소명">
    </div>

    <div id="editor">
        <p style="text-align:center; color:#888; padding: 40px 0;">[불러오기] 버튼을 눌러 데이터를 로드하세요.</p>
    </div>

    <button class="btn-add-song" onclick="addSong()">+ 새로운 곡 추가</button>
</div>

<div class="footer-bar">
    <button class="btn-load" onclick="loadCurrentData()">불러오기</button>
    <button class="btn-save" onclick="saveToGithub()">서버에 저장</button>
</div>

<script>
    let currentData = [];
    let fileSha = "";

    async function loadCurrentData() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        if(!token || !repo) return alert("설정 정보를 입력해주세요.");

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await response.json();
            fileSha = data.sha;
            currentData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            renderEditor();
        } catch (e) {
            alert("데이터 로드 실패: " + e.message);
        }
    }

    function renderEditor() {
        const editor = document.getElementById('editor');
        editor.innerHTML = '';
        
        currentData.forEach((song, sIdx) => {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `
                <div class="song-header">
                    <div class="order-controls">
                        <button class="btn-order" onclick="moveSong(${sIdx}, -1)" ${sIdx === 0 ? 'disabled' : ''}>↑</button>
                        <button class="btn-order" onclick="moveSong(${sIdx}, 1)" ${sIdx === currentData.length - 1 ? 'disabled' : ''}>↓</button>
                    </div>
                    <button class="btn-remove" onclick="removeSong(${sIdx})">곡 삭제</button>
                </div>
                <div class="song-body">
                    <span class="label">곡 제목 (KOR)</span>
                    <input type="text" value="${song.title}" onchange="updateSong(${sIdx}, 'title', this.value)" style="margin-bottom:12px;">
                    <span class="label">영문명 / 작곡가 (ENG)</span>
                    <input type="text" value="${song.subtitle}" onchange="updateSong(${sIdx}, 'subtitle', this.value)" style="margin-bottom:15px;">
                    
                    <span class="label">파트보 구성</span>
                    <div id="parts-${sIdx}">
                        ${song.parts.map((p, pIdx) => `
                            <div class="part-item">
                                <div class="part-inputs">
                                    <input type="text" value="${p.code}" onchange="updatePart(${sIdx}, ${pIdx}, 'code', this.value)" placeholder="코드">
                                    <input type="text" value="${p.name}" onchange="updatePart(${sIdx}, ${pIdx}, 'name', this.value)" placeholder="이름">
                                </div>
                                <input type="text" value="${p.file}" onchange="updatePart(${sIdx}, ${pIdx}, 'file', this.value)" placeholder="경로" style="margin-bottom:8px;">
                                <button class="btn-remove" onclick="removePart(${sIdx}, ${pIdx})">파트 삭제</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn-add-part" onclick="addPart(${sIdx})">+ 파트 추가</button>
                </div>
            `;
            editor.appendChild(card);
        });
    }

    // [순서 변경 로직]
    function moveSong(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= currentData.length) return;
        
        // 배열 요소 스왑
        const temp = currentData[index];
        currentData[index] = currentData[newIndex];
        currentData[newIndex] = temp;
        
        renderEditor(); // 화면 갱신
    }

    function updateSong(sIdx, key, val) { currentData[sIdx][key] = val; }
    function addSong() { currentData.unshift({title:"", subtitle:"", parts:[]}); renderEditor(); window.scrollTo(0,0); }
    function removeSong(sIdx) { if(confirm("이 곡을 삭제할까요?")) { currentData.splice(sIdx, 1); renderEditor(); } }
    function addPart(sIdx) { currentData[sIdx].parts.push({code:"", name:"", file:""}); renderEditor(); }
    function updatePart(sIdx, pIdx, key, val) { currentData[sIdx].parts[pIdx][key] = val; }
    function removePart(sIdx, pIdx) { currentData[sIdx].parts.splice(pIdx, 1); renderEditor(); }

    async function saveToGithub() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        if(!token || !fileSha) return alert("불러오기를 먼저 해주세요.");

        // 한글 깨짐 방지 인코딩
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
        
        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update song order via mobile admin",
                    content: content,
                    sha: fileSha
                })
            });

            if(response.ok) {
                const result = await response.json();
                fileSha = result.content.sha; // SHA 갱신 (중요)
                alert("✅ 순서가 저장되었습니다!");
            } else { alert("❌ 저장 실패"); }
        } catch (e) { alert("오류 발생"); }
    }
</script>
</body>
</html>
