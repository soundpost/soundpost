<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사운드포스트 어드민 V2</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --wood: #3d2b1f; --gold: #d4af37; --bg: #f2f2f7;
            --card-bg: #ffffff; --danger: #ff3b30; --accent: #007aff;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 100px; color: #1c1c1e; }
        header { background-color: var(--wood); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); }
        .container { padding: 12px; }

        /* 설정 카드 */
        .config-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; flex-direction: column; gap: 8px; }
        input, button { border-radius: 8px; border: 1px solid #ddd; padding: 12px; font-size: 16px; width: 100%; box-sizing: border-box; }

        /* 곡 리스트 컨테이너 */
        #editor { display: flex; flex-direction: column; gap: 10px; }

        /* 곡 카드 아코디언 */
        .song-card { background: var(--card-bg); border-radius: 12px; border: 1px solid #e5e5ea; overflow: hidden; }
        
        /* 헤더 영역 (드래그 및 확장 버튼) */
        .song-header { 
            display: flex; align-items: center; padding: 12px; background: #fff; cursor: pointer;
            user-select: none; -webkit-user-select: none;
        }
        .drag-handle { cursor: grab; padding: 5px 10px; color: #ccc; font-size: 20px; }
        .song-info-summary { flex-grow: 1; padding: 0 10px; }
        .song-info-summary h3 { margin: 0; font-size: 1rem; color: var(--wood); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
        .song-info-summary p { margin: 2px 0 0; font-size: 0.75rem; color: #8e8e93; }

        .order-btns { display: flex; gap: 4px; margin-right: 5px; }
        .btn-mini { width: 32px; height: 32px; padding: 0; font-size: 14px; background: #f2f2f7; border: 1px solid #d1d1d6; }

        /* 상세 내용 (아코디언 바디) */
        .song-body { display: none; padding: 15px; border-top: 1px solid #eee; background: #fafafa; }
        .song-card.expanded .song-body { display: block; }
        .song-card.expanded .song-header { background: #f9f9f9; }

        .part-item { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 10px; position: relative; }
        .part-inputs { display: grid; grid-template-columns: 70px 1fr; gap: 8px; margin-bottom: 8px; }

        /* 버튼 테마 */
        .btn-add { background: #e5e5ea; color: #333; margin-bottom: 20px; font-weight: bold; }
        .btn-remove-song { background: var(--danger); color: white; border: none; font-size: 0.8rem; margin-top: 15px; }
        .btn-remove-part { color: var(--danger); background: none; border: none; text-decoration: underline; font-size: 0.8rem; text-align: right; width: auto; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; z-index: 1000; }
        .btn-save { background: var(--gold); color: white; border: none; flex: 2; font-weight: bold; }
        .btn-load { background: var(--wood); color: white; border: none; flex: 1; }
        
        .label { font-size: 0.7rem; color: #8e8e93; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .sortable-ghost { opacity: 0.4; background: #d1d1d6; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0;">SOUNDPOST ADMIN V2</h3>
</header>

<div class="container">
    <div class="config-card">
        <span class="label">GitHub Auth</span>
        <input type="password" id="ghToken" placeholder="GitHub Personal Access Token">
        <input type="text" id="ghRepo" placeholder="아이디/저장소명">
    </div>

    <div id="editor">
        <p style="text-align:center; color:#888; padding: 40px 0;">데이터를 불러와 주세요.</p>
    </div>

    <button class="btn-add" onclick="addSong()" style="margin-top:20px;">+ 새 곡 추가</button>
</div>

<div class="footer-bar">
    <button class="btn-load" onclick="loadCurrentData()">불러오기</button>
    <button class="btn-save" onclick="saveToGithub()">서버에 저장</button>
</div>

<script>
    let currentData = [];
    let fileSha = "";

    async function loadCurrentData() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        if(!token || !repo) return alert("설정 정보를 입력하세요.");

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await response.json();
            fileSha = data.sha;
            currentData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            renderEditor();
            initSortable(); // 드래그 기능 활성화
        } catch (e) {
            alert("로드 실패: " + e.message);
        }
    }

    function initSortable() {
        const el = document.getElementById('editor');
        Sortable.create(el, {
            handle: '.drag-handle', // 핸들 영역으로만 드래그 가능
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                // 드래그 종료 시 실제 배열 순서 변경
                const itemEl = evt.item;
                const oldIdx = evt.oldIndex;
                const newIdx = evt.newIndex;
                
                const movedItem = currentData.splice(oldIdx, 1)[0];
                currentData.splice(newIdx, 0, movedItem);
                
                renderEditor(); // 버튼 활성/비활성 상태 갱신을 위해 재랜더링
            }
        });
    }

    function renderEditor() {
        const editor = document.getElementById('editor');
        editor.innerHTML = '';
        
        currentData.forEach((song, sIdx) => {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.setAttribute('data-index', sIdx);
            card.innerHTML = `
                <div class="song-header">
                    <div class="drag-handle">⠿</div>
                    <div class="song-info-summary" onclick="toggleExpand(this)">
                        <h3>${song.title || '(제목 없음)'}</h3>
                        <p>${song.subtitle || '(정보 없음)'}</p>
                    </div>
                    <div class="order-btns">
                        <button class="btn-mini" onclick="moveSong(${sIdx}, -1)" ${sIdx === 0 ? 'disabled' : ''}>↑</button>
                        <button class="btn-mini" onclick="moveSong(${sIdx}, 1)" ${sIdx === currentData.length - 1 ? 'disabled' : ''}>↓</button>
                    </div>
                </div>
                <div class="song-body">
                    <span class="label">기본 정보</span>
                    <input type="text" value="${song.title}" onchange="updateSong(${sIdx}, 'title', this.value)" placeholder="곡 제목">
                    <input type="text" value="${song.subtitle}" onchange="updateSong(${sIdx}, 'subtitle', this.value)" placeholder="작곡가/영문명" style="margin-top:8px;">
                    
                    <span class="label" style="margin-top:20px;">파트보 목록</span>
                    <div id="parts-${sIdx}">
                        ${song.parts.map((p, pIdx) => `
                            <div class="part-item">
                                <div class="part-inputs">
                                    <input type="text" value="${p.code}" onchange="updatePart(${sIdx}, ${pIdx}, 'code', this.value)" placeholder="코드">
                                    <input type="text" value="${p.name}" onchange="updatePart(${sIdx}, ${pIdx}, 'name', this.value)" placeholder="이름">
                                </div>
                                <input type="text" value="${p.file}" onchange="updatePart(${sIdx}, ${pIdx}, 'file', this.value)" placeholder="파일 경로">
                                <button class="btn-remove-part" onclick="removePart(${sIdx}, ${pIdx})">파트 삭제</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn-add" onclick="addPart(${sIdx})" style="width:100%; border-style:dashed;">+ 파트 추가</button>
                    <button class="btn-remove-song" onclick="removeSong(${sIdx})">곡 전체 삭제</button>
                </div>
            `;
            editor.appendChild(card);
        });
    }

    function toggleExpand(element) {
        const card = element.closest('.song-card');
        card.classList.toggle('expanded');
    }

    function moveSong(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= currentData.length) return;
        const temp = currentData[index];
        currentData[index] = currentData[newIndex];
        currentData[newIndex] = temp;
        renderEditor();
    }

    function updateSong(sIdx, key, val) { currentData[sIdx][key] = val; renderSummary(sIdx); }
    function renderSummary(sIdx) { 
        // 입력 시 실시간으로 헤더 제목 업데이트
        const card = document.querySelector(`.song-card[data-index="${sIdx}"]`);
        card.querySelector('h3').innerText = currentData[sIdx].title || '(제목 없음)';
        card.querySelector('p').innerText = currentData[sIdx].subtitle || '(정보 없음)';
    }

    function addSong() { 
        currentData.unshift({title:"", subtitle:"", parts:[]}); 
        renderEditor(); 
        document.querySelector('.song-card').classList.add('expanded'); // 새 곡은 자동 확장
    }

    function removeSong(sIdx) { if(confirm("삭제하시겠습니까?")) { currentData.splice(sIdx, 1); renderEditor(); } }
    function addPart(sIdx) { currentData[sIdx].parts.push({code:"", name:"", file:""}); renderEditor(); }
    function updatePart(sIdx, pIdx, key, val) { currentData[sIdx].parts[pIdx][key] = val; }
    function removePart(sIdx, pIdx) { currentData[sIdx].parts.splice(pIdx, 1); renderEditor(); }

    async function saveToGithub() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        if(!token || !fileSha) return alert("먼저 로드해주세요.");

        const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
        
        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update via Admin V2", content: content, sha: fileSha })
            });

            if(response.ok) {
                const res = await response.json();
                fileSha = res.content.sha;
                alert("✅ 서버 저장 완료!");
            } else { alert("❌ 저장 실패"); }
        } catch (e) { alert("오류: " + e.message); }
    }
</script>
</body>
</html>
