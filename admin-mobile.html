<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사운드포스트 어드민 V7 - 드래그 마스터</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --wood: #3d2b1f; --gold: #d4af37; --bg: #f2f2f7; --card-bg: #fff; --danger: #ff3b30; --accent: #007aff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 120px; color: #1c1c1e; touch-action: manipulation; }
        header { background-color: var(--wood); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); }
        .container { padding: 12px; }
        .config-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        input, button { border-radius: 8px; border: 1px solid #ddd; padding: 12px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        #song-editor { display: flex; flex-direction: column; gap: 12px; }
        .song-card { background: var(--card-bg); border-radius: 12px; border: 1px solid #e5e5ea; transition: all 0.2s; }
        .song-header { display: flex; align-items: center; padding: 15px; cursor: pointer; position: relative; }
        .drag-handle { cursor: grab; padding: 0 15px 0 5px; color: #ccc; font-size: 24px; }
        .song-info-summary { flex-grow: 1; pointer-events: none; }
        .song-info-summary h3 { margin: 0; font-size: 1.1rem; color: var(--wood); }
        
        .song-body { display: none; padding: 15px; border-top: 1px solid #f0f0f0; background: #fafafa; }
        .song-card.expanded .song-body { display: block; }
        .song-card.drag-over { border: 2px solid var(--accent); background: #f0f7ff; }

        .part-list { min-height: 60px; background: #eeeff3; border-radius: 8px; padding: 10px; margin: 10px 0; border: 2px dashed #ccd; }
        .part-item { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .part-drag-handle { color: #ccc; font-size: 20px; cursor: grab; }
        .part-inputs-wrap { flex-grow: 1; }
        .part-inputs-row { display: grid; grid-template-columns: 60px 1fr; gap: 5px; margin-bottom: 5px; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; z-index: 1000; }
        .btn-save { background: var(--gold); color: white; border: none; flex: 2; font-weight: bold; }
        .btn-load { background: var(--wood); color: white; border: none; flex: 1; }
        .btn-add-song { background: #fff; color: var(--wood); border: 2px solid var(--wood); margin-top: 10px; font-weight: bold; }
        
        .sortable-ghost { opacity: 0.2; background: var(--accent) !important; }
        .feedback-options { display: flex; gap: 15px; margin-top: 10px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<header><h3 style="margin:0;">SOUNDPOST ADMIN V7</h3></header>

<div class="container">
    <div class="config-card">
        <input type="password" id="ghToken" placeholder="GitHub Token" style="margin-bottom:8px;">
        <input type="text" id="ghRepo" value="soundpost/sheet" placeholder="아이디/저장소명">
        <div class="feedback-options">
            <label><input type="checkbox" id="useVib" checked> 진동</label>
            <label><input type="checkbox" id="useSnd" checked> 소리</label>
        </div>
    </div>

    <div id="song-editor">
        <p style="text-align:center; color:#888; padding: 50px 0;">[불러오기]를 눌러주세요.</p>
    </div>

    <button class="btn-add-song" onclick="addSong()">+ 새로운 연주곡 추가</button>
</div>

<div class="footer-bar">
    <button class="btn-load" onclick="loadCurrentData()">불러오기</button>
    <button class="btn-save" onclick="saveToGithub()">서버에 저장</button>
</div>

<script>
    let currentData = [];
    let fileSha = "";
    let expandedIds = new Set();
    let sortableInstances = [];
    let hoverTimer = null; // 호버 자동 확장을 위한 타이머
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playFeedback() {
        if (document.getElementById('useVib').checked && navigator.vibrate) navigator.vibrate(15);
        if (document.getElementById('useSnd').checked) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    async function loadCurrentData() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        if(!token) return alert("토큰을 입력하세요.");
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            currentData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            currentData.forEach((song, i) => song._id = song._id || Date.now() + i);
            renderAll();
        } catch (e) { alert("로드 실패!"); }
    }

    function renderAll() {
        sortableInstances.forEach(s => s.destroy());
        sortableInstances = [];
        const container = document.getElementById('song-editor');
        container.innerHTML = '';
        
        currentData.forEach((song) => {
            const card = document.createElement('div');
            card.className = `song-card ${expandedIds.has(song._id) ? 'expanded' : ''}`;
            card.dataset.id = song._id;
            
            // [이미지] 드래그 앤 드롭 인터페이스의 중첩 리스트 구조
            card.innerHTML = `
                <div class="song-header" onclick="toggleExpand(${song._id})" 
                     ondragover="handleHeaderDragOver(event, ${song._id})" 
                     ondragleave="clearHoverTimer()"
                     ondrop="handleHeaderDrop(event, ${song._id})">
                    <div class="drag-handle">⠿</div>
                    <div class="song-info-summary">
                        <h3>${song.title || '제목 없음'}</h3>
                        <p>${song.subtitle || '정보 없음'} (${song.parts.length} 파트)</p>
                    </div>
                </div>
                <div class="song-body">
                    <input type="text" value="${song.title}" onchange="updateSongData(${song._id}, 'title', this.value)" placeholder="곡 제목">
                    <input type="text" value="${song.subtitle}" onchange="updateSongData(${song._id}, 'subtitle', this.value)" style="margin-top:8px;" placeholder="작곡가/부제">
                    <div class="part-list" data-song-id="${song._id}">
                        ${song.parts.map((p, pIdx) => `
                            <div class="part-item">
                                <div class="part-drag-handle">::</div>
                                <div class="part-inputs-wrap">
                                    <div class="part-inputs-row">
                                        <input type="text" value="${p.code}" onchange="updatePartData(${song._id}, ${pIdx}, 'code', this.value)">
                                        <input type="text" value="${p.name}" onchange="updatePartData(${song._id}, ${pIdx}, 'name', this.value)">
                                    </div>
                                    <input type="text" value="${p.file}" onchange="updatePartData(${song._id}, ${pIdx}, 'file', this.value)">
                                </div>
                                <button onclick="removePart(${song._id}, ${pIdx})" style="width:auto; color:red; border:none; background:none;">✕</button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addPart(${song._id})" style="font-size:13px; padding:8px; background:#fff;">+ 파트 추가</button>
                    <button onclick="removeSong(${song._id})" style="background:#fff; color:red; margin-top:15px; padding:8px; border:1px solid red;">곡 전체 삭제</button>
                </div>
            `;
            container.appendChild(card);
        });
        initSortables();
    }

    // --- 드래그 중인 파트가 닫힌 헤더 위에 있을 때의 로직 ---
    function handleHeaderDragOver(e, id) {
        e.preventDefault();
        const card = document.querySelector(`.song-card[data-id="${id}"]`);
        if (!card.classList.contains('expanded')) {
            card.classList.add('drag-over');
            if (!hoverTimer) {
                hoverTimer = setTimeout(() => {
                    expandedIds.add(id);
                    renderAll();
                    clearHoverTimer();
                }, 500); // 0.5초 머무르면 자동 확장
            }
        }
    }

    function clearHoverTimer() {
        clearTimeout(hoverTimer);
        hoverTimer = null;
        document.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'));
    }

    // 닫힌 헤더에 직접 드롭했을 때 처리
    function handleHeaderDrop(e, toId) {
        e.preventDefault();
        // SortableJS의 내부 이벤트를 통해 데이터가 이미 처리되지 않았을 경우를 위한 백업 로직은 initSortables에서 통합 관리
    }

    function initSortables() {
        const songEditor = document.getElementById('song-editor');
        
        // 1. 곡 순서 변경
        sortableInstances.push(Sortable.create(songEditor, {
            handle: '.drag-handle', animation: 200,
            onStart: () => { if(audioCtx.state === 'suspended') audioCtx.resume(); playFeedback(); },
            onEnd: (evt) => {
                const movedItem = currentData.splice(evt.oldIndex, 1)[0];
                currentData.splice(evt.newIndex, 0, movedItem);
                playFeedback();
                renderAll();
            }
        }));

        // 2. 파트 순서 및 곡 간 이동 (가장 핵심 로직)
        document.querySelectorAll('.part-list').forEach(el => {
            sortableInstances.push(Sortable.create(el, {
                group: 'parts-group', handle: '.part-drag-handle', animation: 200,
                onStart: () => playFeedback(),
                onEnd: (evt) => {
                    const fromId = parseInt(evt.from.dataset.songId);
                    let toId = parseInt(evt.to.dataset.songId);
                    
                    // 만약 닫힌 카드 위에 드랍되어 evt.to가 제대로 잡히지 않은 경우 대응
                    // SortableJS가 닫힌 영역을 인식하지 못할 때를 대비해 좌표 추적
                    const dropEl = document.elementFromPoint(evt.originalEvent.clientX, evt.originalEvent.clientY);
                    const targetCard = dropEl ? dropEl.closest('.song-card') : null;
                    
                    if (targetCard) toId = parseInt(targetCard.dataset.id);

                    const fromSong = currentData.find(s => s._id === fromId);
                    const toSong = currentData.find(s => s._id === toId);
                    
                    if (!fromSong || !toSong) return;

                    // 데이터 이동 실행
                    const part = fromSong.parts.splice(evt.oldIndex, 1)[0];

                    if (fromId !== toId) {
                        // 곡 간 이동 시: 보낸 곡 닫기, 받은 곡 열기 및 맨 뒤 삽입
                        toSong.parts.push(part); 
                        expandedIds.delete(fromId);
                        expandedIds.add(toId);
                    } else {
                        // 같은 곡 내 순서 변경
                        fromSong.parts.splice(evt.newIndex, 0, part);
                    }
                    
                    playFeedback();
                    clearHoverTimer();
                    renderAll();
                }
            }));
        });
    }

    function toggleExpand(id) {
        if (expandedIds.has(id)) expandedIds.delete(id);
        else expandedIds.add(id);
        renderAll();
    }

    function updateSongData(id, key, val) { const s = currentData.find(s => s._id === id); if(s) s[key] = val; }
    function updatePartData(id, pIdx, key, val) { const s = currentData.find(s => s._id === id); if(s) s.parts[pIdx][key] = val; }
    function addSong() { const id = Date.now(); currentData.unshift({_id:id, title:"", subtitle:"", parts:[]}); expandedIds.clear(); expandedIds.add(id); renderAll(); }
    function removeSong(id) { if(confirm("삭제?")) { currentData = currentData.filter(s=>s._id!==id); renderAll(); } }
    function addPart(id) { const s = currentData.find(s=>s._id===id); s.parts.push({code:"", name:"", file:""}); renderAll(); }
    function removePart(id, pIdx) { const s = currentData.find(s=>s._id===id); s.parts.splice(pIdx, 1); renderAll(); }

    async function saveToGithub() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        if(!fileSha) return alert("데이터 로드 필요");
        const cleanData = currentData.map(({ _id, ...rest }) => rest);
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(cleanData, null, 2))));
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Admin V7 Final", content: content, sha: fileSha })
            });
            if(res.ok) {
                const json = await res.json();
                fileSha = json.content.sha;
                alert("✅ 저장 성공!");
            }
        } catch (e) { alert("저장 실패"); }
    }
</script>
</body>
</html>
